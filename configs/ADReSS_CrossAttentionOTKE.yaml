experiment_name: "ADReSS_CrossAttentionOTKE"
mode: "train_test"
model_name: "CrossAttentionOTKE"
seeds: [42, 2023, 2024, 88, 1234]
data_type: "multimodal"
model_output_dir: "models"
early_stopping_patience: 20
verbose: true
log_dir: "results"
use_wandb: true
text_encoder: "bert-base-uncased"
audio_encoder: "openai/whisper-small"

model:
  audio_encoder: "openai/whisper-small"
  text_encoder: "bert-base-uncased"
  num_labels: 2
  dropout: 0.1
  cross_heads: 1
  use_ffn: false

data:
  train_path: "./data/ADReSS/Train"
  test_path: "./data/ADReSS/Test"
  val_split: 0.35
  batch_size: 200
  num_proc: 1
  audio_chunk_duration: 30 
  max_text_length: 512

training:
  eval_strategy: "steps"
  save_strategy: "steps"
  learning_rate: 0.00002
  save_steps: 1
  eval_steps: 1
  save_total_limit: 1
  max_grad_norm: 1.0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  num_train_epochs: 50
  logging_steps: 1
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: "wandb"
  max_steps: -1